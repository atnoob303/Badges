<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BADGE EXPLORER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #080808;
–surface: #101010;
–border: #1e1e1e;
–border-hover: #2e2e2e;
–text: #e8e8e8;
–muted: #555;
–dim: #333;
–accent: #ffffff;
–mono: ‘Space Mono’, monospace;
–sans: ‘DM Sans’, sans-serif;
}

html {
background-color: #080808 !important;
color-scheme: dark;
}

body {
background: #080808 !important;
color: var(–text);
font-family: var(–sans);
min-height: 100vh;
font-size: 14px;
line-height: 1.6;
}

/* HEADER */
header {
padding: 48px 40px 32px;
border-bottom: 1px solid var(–border);
}

.header-label {
font-family: var(–mono);
font-size: 10px;
letter-spacing: 0.3em;
color: var(–muted);
text-transform: uppercase;
margin-bottom: 8px;
}

h1 {
font-family: var(–mono);
font-size: clamp(22px, 4vw, 36px);
font-weight: 700;
letter-spacing: -0.02em;
color: var(–accent);
}

/* INPUT AREA */
.input-area {
padding: 32px 40px;
border-bottom: 1px solid var(–border);
display: flex;
align-items: center;
gap: 0;
}

.input-prefix {
font-family: var(–mono);
font-size: 11px;
color: var(–muted);
padding: 0 16px 0 0;
letter-spacing: 0.1em;
white-space: nowrap;
}

#universeInput {
flex: 1;
background: transparent;
border: none;
border-bottom: 1px solid var(–dim);
color: var(–text);
font-family: var(–mono);
font-size: 15px;
padding: 8px 0;
outline: none;
transition: border-color 0.2s;
letter-spacing: 0.05em;
}

#universeInput:focus {
border-bottom-color: var(–accent);
}

#universeInput::placeholder {
color: var(–dim);
}

#fetchBtn {
background: var(–accent);
color: var(–bg);
border: none;
font-family: var(–mono);
font-size: 11px;
font-weight: 700;
letter-spacing: 0.15em;
text-transform: uppercase;
padding: 10px 24px;
cursor: pointer;
margin-left: 24px;
transition: opacity 0.2s;
flex-shrink: 0;
}

#fetchBtn:hover { opacity: 0.8; }
#fetchBtn:disabled { opacity: 0.3; cursor: not-allowed; }

/* STATUS BAR */
#statusBar {
padding: 12px 40px;
font-family: var(–mono);
font-size: 11px;
color: var(–muted);
letter-spacing: 0.08em;
border-bottom: 1px solid var(–border);
min-height: 40px;
display: flex;
align-items: center;
gap: 24px;
}

.status-dot {
width: 5px;
height: 5px;
border-radius: 50%;
background: var(–muted);
flex-shrink: 0;
}

.status-dot.loading { background: #888; animation: pulse 1s infinite; }
.status-dot.done { background: #e8e8e8; }
.status-dot.error { background: #666; }

@keyframes pulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.3; }
}

/* GRID */
#badgeGrid {
padding: 32px 40px;
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 1px;
background: var(–border);
}

/* CARD */
.badge-card {
background: var(–bg);
padding: 24px;
display: flex;
flex-direction: column;
gap: 16px;
transition: background 0.15s;
animation: fadeIn 0.3s ease both;
}

.badge-card:hover { background: var(–surface); }

@keyframes fadeIn {
from { opacity: 0; transform: translateY(4px); }
to { opacity: 1; transform: translateY(0); }
}

.card-top {
display: flex;
gap: 16px;
align-items: flex-start;
}

.badge-icon {
width: 52px;
height: 52px;
object-fit: cover;
flex-shrink: 0;
filter: grayscale(100%);
opacity: 0.85;
transition: opacity 0.2s, filter 0.2s;
background: var(–border);
}

.badge-card:hover .badge-icon {
filter: grayscale(0%);
opacity: 1;
}

.badge-icon-placeholder {
width: 52px;
height: 52px;
background: var(–border);
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
font-family: var(–mono);
font-size: 18px;
color: var(–dim);
}

.card-info { flex: 1; min-width: 0; }

.badge-name {
font-family: var(–mono);
font-size: 12px;
font-weight: 700;
color: var(–accent);
letter-spacing: 0.02em;
line-height: 1.3;
word-break: break-word;
}

.badge-id {
font-family: var(–mono);
font-size: 9px;
color: var(–muted);
margin-top: 4px;
letter-spacing: 0.05em;
}

.badge-desc {
font-size: 12px;
color: var(–muted);
line-height: 1.5;
word-break: break-word;
font-style: italic;
}

.badge-desc.empty { color: var(–dim); font-style: italic; }

/* STATS ROW */
.stats-row {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
border-top: 1px solid var(–border);
padding-top: 14px;
gap: 0;
}

.stat { display: flex; flex-direction: column; gap: 4px; }
.stat + .stat { padding-left: 12px; border-left: 1px solid var(–border); }

.stat-label {
font-family: var(–mono);
font-size: 8px;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–muted);
}

.stat-value {
font-family: var(–mono);
font-size: 14px;
font-weight: 700;
color: var(–text);
}

.stat-value.zero { color: var(–dim); }

/* DISABLED BADGE */
.badge-card.disabled { opacity: 0.4; }
.disabled-tag {
font-family: var(–mono);
font-size: 9px;
letter-spacing: 0.15em;
text-transform: uppercase;
color: var(–muted);
border: 1px solid var(–border);
padding: 2px 6px;
display: inline-block;
margin-top: 4px;
}

/* EMPTY STATE */
#emptyState {
padding: 80px 40px;
text-align: center;
display: none;
}

.empty-label {
font-family: var(–mono);
font-size: 11px;
letter-spacing: 0.2em;
color: var(–muted);
text-transform: uppercase;
}

/* SUMMARY */
#summary {
padding: 20px 40px;
border-top: 1px solid var(–border);
display: none;
gap: 32px;
flex-wrap: wrap;
}

.sum-item {
display: flex;
flex-direction: column;
gap: 2px;
}

.sum-label {
font-family: var(–mono);
font-size: 9px;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–muted);
}

.sum-value {
font-family: var(–mono);
font-size: 18px;
font-weight: 700;
color: var(–accent);
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(–bg); }
::-webkit-scrollbar-thumb { background: var(–border); }
</style>

</head>
<body>

<header>
  <div class="header-label">Roblox · Badge Explorer</div>
  <h1>BADGE EXPLORER</h1>
</header>

<div class="input-area">
  <span class="input-prefix">UNIVERSE ID</span>
  <input type="text" id="universeInput" placeholder="e.g. 7109213369" autocomplete="off" spellcheck="false">
  <button id="fetchBtn" onclick="fetchBadges()">FETCH</button>
</div>

<div id="statusBar">
  <span class="status-dot" id="statusDot"></span>
  <span id="statusText">Enter a Universe ID to begin</span>
</div>

<div id="summary"></div>

<div id="badgeGrid"></div>
<div id="emptyState"><span class="empty-label">No badges found</span></div>

<script>
  const input = document.getElementById('universeInput');
  const btn = document.getElementById('fetchBtn');
  const grid = document.getElementById('badgeGrid');
  const statusText = document.getElementById('statusText');
  const statusDot = document.getElementById('statusDot');
  const summary = document.getElementById('summary');
  const emptyState = document.getElementById('emptyState');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') fetchBadges(); });

  function setStatus(type, msg) {
    statusDot.className = 'status-dot ' + type;
    statusText.textContent = msg;
  }

  async function fetchAllPages(universeId) {
    let all = [];
    let cursor = null;
    let page = 1;
    do {
      let url = `https://badges.roproxy.com/v1/universes/${universeId}/badges?limit=100&sortOrder=Asc`;
      if (cursor) url += `&cursor=${encodeURIComponent(cursor)}`;
      setStatus('loading', `Fetching page ${page}…`);
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      all = all.concat(data.data || []);
      cursor = data.nextPageCursor || null;
      page++;
    } while (cursor);
    return all;
  }

  async function fetchBadges() {
    const id = input.value.trim();
    if (!id) return;

    btn.disabled = true;
    grid.innerHTML = '';
    summary.style.display = 'none';
    emptyState.style.display = 'none';
    setStatus('loading', 'Connecting…');

    try {
      const badges = await fetchAllPages(id);

      if (!badges.length) {
        setStatus('done', 'No badges found');
        emptyState.style.display = 'block';
        return;
      }

      const totalOwned = badges.reduce((s, b) => s + (b.statistics?.awardedCount || 0), 0);
      const withOwners = badges.filter(b => b.statistics?.awardedCount > 0).length;

      summary.style.display = 'flex';
      summary.innerHTML = `
        <div class="sum-item"><div class="sum-label">Total Badges</div><div class="sum-value">${badges.length}</div></div>
        <div class="sum-item"><div class="sum-label">Total Awarded</div><div class="sum-value">${totalOwned.toLocaleString()}</div></div>
        <div class="sum-item"><div class="sum-label">Has Owners</div><div class="sum-value">${withOwners}</div></div>
      `;

      // Fetch thumbnails in batches of 100
      const thumbMap = {};
      const ids = badges.map(b => b.id);
      for (let i = 0; i < ids.length; i += 100) {
        const chunk = ids.slice(i, i + 100).join(',');
        try {
          const tRes = await fetch(`https://thumbnails.roproxy.com/v1/badges/icons?badgeIds=${chunk}&size=150x150&format=Png&isCircular=false`);
          const tData = await tRes.json();
          (tData.data || []).forEach(t => { if (t.imageUrl) thumbMap[t.targetId] = t.imageUrl; });
        } catch(e) {}
      }

      badges.forEach((b, i) => {
        const card = document.createElement('div');
        card.className = 'badge-card' + (b.enabled ? '' : ' disabled');
        card.style.animationDelay = `${Math.min(i * 20, 400)}ms`;

        const thumbUrl = thumbMap[b.id];
        const iconHtml = thumbUrl
          ? `<img class="badge-icon" src="${thumbUrl}" alt="" loading="lazy" onerror="this.outerHTML='<div class=badge-icon-placeholder>?</div>'">`
          : `<div class="badge-icon-placeholder">?</div>`;

        const desc = b.description || b.displayDescription;
        const descHtml = desc
          ? `<div class="badge-desc">${escHtml(desc.replace(/\n/g, ' ').substring(0, 120))}${desc.length > 120 ? '…' : ''}</div>`
          : `<div class="badge-desc empty">No description</div>`;

        const stats = b.statistics || {};
        const awarded = stats.awardedCount ?? 0;
        const yesterday = stats.pastDayAwardedCount ?? 0;
        const winRate = (stats.winRatePercentage ?? 0).toFixed(1);

        card.innerHTML = `
          <div class="card-top">
            ${iconHtml}
            <div class="card-info">
              <div class="badge-name">${escHtml(b.displayName || b.name)}</div>
              <div class="badge-id">#${b.id}</div>
              ${!b.enabled ? '<span class="disabled-tag">Disabled</span>' : ''}
            </div>
          </div>
          ${descHtml}
          <div class="stats-row">
            <div class="stat">
              <div class="stat-label">Total</div>
              <div class="stat-value ${awarded === 0 ? 'zero' : ''}">${awarded.toLocaleString()}</div>
            </div>
            <div class="stat">
              <div class="stat-label">Yesterday</div>
              <div class="stat-value ${yesterday === 0 ? 'zero' : ''}">${yesterday.toLocaleString()}</div>
            </div>
            <div class="stat">
              <div class="stat-label">Win %</div>
              <div class="stat-value ${winRate === '0.0' ? 'zero' : ''}">${winRate}%</div>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });

      setStatus('done', `${badges.length} badge${badges.length !== 1 ? 's' : ''} loaded`);
    } catch (e) {
      setStatus('error', `Error: ${e.message}`);
    } finally {
      btn.disabled = false;
    }
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

</body>
</html>
